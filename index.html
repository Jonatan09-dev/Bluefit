<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluefit Nutrition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .hidden { display: none; }
        .progress-ring { transform: rotate(-90deg); }
    </style>
</head>
<body class="pb-24">

    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <h1 class="text-4xl font-black text-pink-600 mb-8 italic">Bluefit</h1>
        <div class="w-full max-w-sm space-y-4">
            <input id="email" type="email" placeholder="E-Mail" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-pink-600">
            <input id="password" type="password" placeholder="Passwort" class="w-full p-4 bg-slate-800 rounded-2xl border border-slate-700 outline-none focus:border-pink-600">
            <button onclick="handleAuth()" class="w-full p-4 bg-pink-600 rounded-2xl font-bold active:scale-95 transition-all">Login / Registrieren</button>
            <p id="error-msg" class="text-red-500 text-sm text-center font-medium mt-2"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="p-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Ernährung</h1>
            <button onclick="firebase.auth().signOut()" class="text-slate-500 text-xs bg-slate-800 px-3 py-1 rounded-full">Logout</button>
        </header>

        <div class="flex justify-around px-4 mb-8">
            <div class="flex flex-col items-center text-[10px] text-slate-500 font-bold uppercase"><span>Mo</span><div class="w-8 h-8 rounded-full border border-pink-600 flex items-center justify-center text-pink-600 mt-1">✓</div></div>
            <div class="flex flex-col items-center text-[10px] text-white font-bold uppercase"><span>Di</span><div class="w-8 h-8 rounded-full bg-pink-600 flex items-center justify-center mt-1">25</div></div>
            <div class="flex flex-col items-center text-[10px] text-slate-500 font-bold uppercase"><span>Mi</span><div class="w-8 h-8 mt-1 border border-slate-700 rounded-full"></div></div>
            <div class="flex flex-col items-center text-[10px] text-slate-500 font-bold uppercase"><span>Do</span><div class="w-8 h-8 mt-1 border border-slate-700 rounded-full"></div></div>
            <div class="flex flex-col items-center text-[10px] text-slate-500 font-bold uppercase"><span>Fr</span><div class="w-8 h-8 mt-1 border border-slate-700 rounded-full"></div></div>
        </div>

        <main class="px-6 space-y-6">
            <div class="bg-slate-900/80 p-6 rounded-[32px] border border-slate-800 flex flex-col items-center shadow-2xl">
                <p class="text-xs text-slate-400 mb-4 font-bold tracking-widest uppercase">Ernährungsplan heute</p>
                <div class="flex items-center gap-6">
                    <div class="text-center"><span class="block font-bold">611</span><span class="text-[9px] text-slate-500 uppercase">konsumiert</span></div>
                    
                    <div class="relative flex items-center justify-center">
                        <svg class="progress-ring" width="120" height="120">
                            <circle stroke="#1e293b" stroke-width="8" fill="transparent" r="50" cx="60" cy="60"/>
                            <circle stroke="#db2777" stroke-width="8" stroke-dasharray="314" stroke-dashoffset="100" stroke-linecap="round" fill="transparent" r="50" cx="60" cy="60"/>
                        </svg>
                        <div class="absolute text-center">
                            <span id="kcal-offen" class="text-xl font-black block">2514</span>
                            <span class="text-[8px] text-slate-500 uppercase tracking-tighter">kcal offen</span>
                        </div>
                    </div>

                    <div class="text-center"><span class="block font-bold">3125</span><span class="text-[9px] text-slate-500 uppercase">geplant</span></div>
                </div>
                
                <div class="flex gap-10 mt-8 text-center border-t border-slate-800 pt-4 w-full justify-around">
                    <div><span class="block font-bold text-sm">72 / 308g</span><span class="text-[8px] text-slate-500 uppercase">Kohlenhydrate</span></div>
                    <div><span class="block font-bold text-sm">37 / 218g</span><span class="text-[8px] text-slate-500 uppercase">Eiweiß</span></div>
                    <div><span class="block font-bold text-sm">16 / 104g</span><span class="text-[8px] text-slate-500 uppercase">Fett</span></div>
                </div>
            </div>

            <div class="space-y-3">
                <div class="bg-slate-800/50 p-5 rounded-3xl flex justify-between items-center border border-slate-700">
                    <div class="flex items-center gap-4">
                        <span class="text-xl">☕</span>
                        <div><p class="font-bold text-sm">Frühstück</p><p class="text-[10px] text-slate-500">611 kcal</p></div>
                    </div>
                    <button class="text-pink-600 text-2xl">+</button>
                </div>
                <div class="bg-slate-800/50 p-5 rounded-3xl flex justify-between items-center border border-slate-700">
                    <div class="flex items-center gap-4"><span class="text-xl">🥪</span><p class="font-bold text-sm">Mittag</p></div>
                    <button class="text-pink-600 text-2xl">+</button>
                </div>
            </div>
        </main>
    </div>

    <script>
    const firebaseConfig = {
    apiKey: "AIzaSyBvAvCiCoMU6j9znTnjnv21vgaqFlwgNak",
    authDomain: "bluefit-d671e.firebaseapp.com",
    projectId: "bluefit-d671e",
    storageBucket: "bluefit-d671e.firebasestorage.app",
    messagingSenderId: "972090891640",
    appId: "1:972090891640:web:5036ed05019d4277cefc8d",
    measurementId: "G-5WZ2Q1EPZN"
  };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorElement = document.getElementById('error-msg');
        
        if(!email || !pass) {
            errorElement.innerText = "Bitte Daten eingeben.";
            return;
        }

        errorElement.innerText = "Verarbeitung...";

        // Versuch einzuloggen, wenn fehlgeschlagen -> Registrieren
        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                console.log("Login erfolgreich!");
                showApp(); // Manuelle Umschaltung
            })
            .catch((error) => {
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    auth.createUserWithEmailAndPassword(email, pass)
                        .then(() => showApp())
                        .catch(err => errorElement.innerText = "Fehler: " + err.message);
                } else {
                    errorElement.innerText = error.message;
                }
            });
    }

    // Funktion zum Umschalten der Ansicht
    function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
        console.log("App-Inhalt wird jetzt angezeigt");
    }

    // Überwachung des Login-Status
    auth.onAuthStateChanged(user => {
        if (user) {
            showApp();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-content').classList.add('hidden');
        }
    });
</script>
