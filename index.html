<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluefit Nutrition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#111827] text-white font-sans pb-20">

    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <h1 class="text-4xl font-bold text-[#db2777] mb-8 italic">Bluefit</h1>
        <div class="w-full max-w-sm space-y-4">
            <input id="email" type="email" placeholder="E-Mail" class="w-full p-4 bg-gray-800 rounded-2xl border border-gray-700 outline-none focus:border-[#db2777]">
            <input id="password" type="password" placeholder="Passwort" class="w-full p-4 bg-gray-800 rounded-2xl border border-gray-700 outline-none focus:border-[#db2777]">
            <button onclick="handleAuth()" id="btn-text" class="w-full p-4 bg-[#db2777] rounded-2xl font-bold active:scale-95 transition-transform">Login / Registrieren</button>
            <p id="error-msg" class="text-red-500 text-sm text-center font-medium"></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="p-6 flex justify-between items-center bg-[#111827]/80 backdrop-blur sticky top-0 z-50">
            <h1 class="text-2xl font-bold">Ernährung</h1>
            <button onclick="firebase.auth().signOut()" class="text-gray-500 text-xs bg-gray-800 px-3 py-1 rounded-full">Logout</button>
        </header>

        <main class="px-6 space-y-6">
            <div class="bg-[#1e293b]/50 p-6 rounded-[32px] border border-gray-800 flex flex-col items-center shadow-2xl">
                <div class="relative flex items-center justify-center">
                    <svg class="rotate-[-90deg]" width="180" height="180">
                        <circle stroke="#1f2937" stroke-width="10" fill="transparent" r="75" cx="90" cy="90"/>
                        <circle id="kcal-ring" stroke="#db2777" stroke-width="10" stroke-dasharray="471" stroke-dashoffset="120" stroke-linecap="round" fill="transparent" r="75" cx="90" cy="90"/>
                    </svg>
                    <div class="absolute text-center">
                        <span id="kcal-offen" class="text-4xl font-black block">2514</span>
                        <span class="text-gray-500 text-[10px] uppercase tracking-widest">kcal offen</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-8 mt-8 w-full">
                    <div class="text-center border-b-2 border-blue-500 pb-2">
                        <span id="carbs" class="block font-bold">72 / 308g</span>
                        <span class="text-[9px] text-gray-500 uppercase">Kohlenhydrate</span>
                    </div>
                    <div class="text-center border-b-2 border-pink-600 pb-2">
                        <span id="protein" class="block font-bold">37 / 218g</span>
                        <span class="text-[9px] text-gray-500 uppercase">Eiweiß</span>
                    </div>
                    <div class="text-center border-b-2 border-emerald-500 pb-2">
                        <span id="fat" class="block font-bold">16 / 104g</span>
                        <span class="text-[9px] text-gray-500 uppercase">Fett</span>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="bg-[#1e293b]/40 p-5 rounded-3xl flex justify-between items-center border border-gray-800">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-pink-600/10 rounded-xl flex items-center justify-center text-xl">🍳</div>
                        <div><p class="font-bold">Frühstück</p><p class="text-[10px] text-gray-500">611 kcal</p></div>
                    </div>
                    <button onclick="addEntry(611)" class="text-pink-600 text-3xl font-light">+</button>
                </div>
                <div class="bg-[#1e293b]/40 p-5 rounded-3xl flex justify-between items-center border border-gray-800 text-gray-400">
                    <div class="flex items-center gap-4"><span>🥪</span> <p class="font-bold">Mittagessen</p></div>
                    <button class="text-pink-600 text-3xl font-light">+</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DEINE FIREBASE DATEN
        const firebaseConfig = {
            apiKey: "AIzaSyBvAvCiCoMu6j9znTnjnv21vgaqFLwgNAk",
            authDomain: "bluefit-d671e.firebaseapp.com",
            projectId: "bluefit-d671e",
            storageBucket: "bluefit-d671e.firebasestorage.app",
            messagingSenderId: "972090891640",
            appId: "1:972090891640:web:5036ed05019d4277cefc8d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // AUTH FUNKTION
        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorElement = document.getElementById('error-msg');
            
            if(!email || !pass) {
                errorElement.innerText = "Bitte E-Mail und Passwort eingeben.";
                return;
            }

            errorElement.innerText = "Prüfe Daten...";

            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => {
                    if (error.code === 'auth/user-not-found') {
                        return auth.createUserWithEmailAndPassword(email, pass);
                    } else {
                        errorElement.innerText = "Fehler: " + error.message;
                    }
                });
        }

        // ZUSTANDS-ÜBERWACHUNG
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        function addEntry(kcal) {
            alert("Mahlzeit hinzugefügt! (Logik folgt im nächsten Schritt)");
        }
    </script>
</body>
</html>
